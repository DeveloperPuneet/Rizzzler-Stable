  <circle cx="110" cy="110" r="86" fill="rgba(255,255,255,0.12)"/>
  <circle cx="110" cy="110" r="68" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="2 8"/>
  <g transform="translate(110 110)" filter="url(#glow)">
    <g transform="rotate(-18)">
      <path d="M-16 -28 C-52 -88, -36 -102, -2 -64 C20 -44, -2 -6, -16 -28 Z" fill="url(#wing)"/>
      <path d="M-10 -26 C-42 -70, -86 -70, -56 -24 C-40 0, -2 -2, -10 -26 Z" fill="rgba(255,255,255,0.72)"/>
      <path d="M-36 -54 C-20 -62, -12 -78, -12 -90" stroke="#ffffff" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round" fill="none"/>
    </g>
    <g transform="rotate(18)">
